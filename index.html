<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BarberPilot">
<meta name="theme-color" content="#080706">
<title>BarberPilot · Saúl Fino</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080706; --s1:#111009; --s2:#181510; --s3:#221c12;
  --border:#2a2318; --border2:#3d3325;
  --text:#f0ebe0; --text2:#9c8f78; --text3:#5c5040;
  --gold:#c9a84c; --gold2:#e8c97a; --gold3:#7a5f20;
  --ok:#4db87a; --ok2:#1a5c34;
  --red:#e05555;
  --serif:'Cormorant Garamond',serif;
  --sans:'Barlow',sans-serif;
  --cond:'Barlow Condensed',sans-serif;
  --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;overscroll-behavior:none}

/* ══ SPLASH / LOGIN ══════════════════════════════════════════ */
#splash{
  position:fixed;inset:0;
  background:linear-gradient(160deg,#0f0d07 0%,#1a1508 40%,#0a0906 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;padding:32px 24px;
  transition:opacity .4s ease;
}
.splash-logo{
  width:110px;height:110px;object-fit:contain;
  filter:drop-shadow(0 0 24px rgba(201,168,76,.3));
  margin-bottom:20px;animation:logoIn .8s ease both;
}
.splash-name{
  font-family:var(--serif);font-size:32px;font-weight:600;
  letter-spacing:.08em;color:var(--text);
  animation:fadeUp .6s .2s ease both;
}
.splash-sub{
  font-family:var(--cond);font-size:12px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--gold);margin-top:6px;
  animation:fadeUp .6s .35s ease both;
}
.splash-divider{
  width:40px;height:1px;background:var(--gold3);margin:28px auto;
  animation:fadeUp .6s .5s ease both;
}
.splash-pregunta{
  font-family:var(--cond);font-size:13px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text2);margin-bottom:20px;
  animation:fadeUp .6s .6s ease both;
}
.barber-btn{
  width:100%;max-width:300px;padding:16px 24px;
  background:var(--s2);border:1px solid var(--border2);
  border-radius:12px;cursor:pointer;
  display:flex;align-items:center;gap:14px;
  transition:all .15s;margin-bottom:10px;
  animation:fadeUp .6s ease both;
  -webkit-tap-highlight-color:rgba(201,168,76,.2);
  touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
}
.barber-btn:hover,.barber-btn:active{
  background:var(--s3);border-color:var(--gold3);
  transform:translateY(-1px);
}
.barber-avatar{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--cond);font-size:16px;font-weight:700;
  flex-shrink:0;
}
.barber-info{display:flex;flex-direction:column;text-align:left}
.barber-nombre{
  font-family:var(--cond);font-size:20px;font-weight:600;
  letter-spacing:.04em;color:var(--text);
}
.barber-rol{font-size:11px;color:var(--text3);margin-top:2px}
.barber-arrow{margin-left:auto;color:var(--text3);font-size:18px}

/* ══ APP PRINCIPAL ═══════════════════════════════════════════ */
#app{display:none;flex-direction:column;height:100dvh;overflow:hidden}

/* Header */
.app-hdr{
  background:linear-gradient(135deg,#0f0d08,#1a1408);
  border-bottom:1px solid var(--border2);
  padding:env(safe-area-inset-top,12px) 16px 12px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.app-hdr-logo{width:32px;height:32px;object-fit:contain;border-radius:4px}
.app-hdr-name{font-family:var(--serif);font-size:16px;font-weight:600;letter-spacing:.04em}
.app-hdr-sub{font-family:var(--cond);font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--gold);margin-top:1px}
.app-hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);
  animation:pulse 2s infinite;flex-shrink:0}
.btn-logout{background:none;border:none;color:var(--text3);font-size:20px;
  cursor:pointer;padding:4px;line-height:1}

/* Nav inferior */
.app-nav{
  background:var(--s1);border-top:1px solid var(--border);
  display:flex;justify-content:space-around;
  padding:10px 0 calc(8px + env(safe-area-inset-bottom,0px));
  flex-shrink:0;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;padding:4px 12px;
  min-width:60px;
}
.nav-icon{font-size:24px;line-height:1}
.nav-label{font-family:var(--cond);font-size:11px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text3);transition:color .12s}
.nav-btn.on .nav-label{color:var(--gold)}
.nav-btn.on .nav-icon{filter:drop-shadow(0 0 6px var(--gold))}

/* Contenido scrollable */
.app-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 0 env(safe-area-inset-bottom,0px)}
.pane{display:none;padding:18px;animation:fadeUp .25s ease}
.pane.on{display:block}

/* Cards */
.card{background:var(--s1);border:1px solid var(--border);
  border-radius:12px;padding:18px 20px;margin-bottom:14px}
.card-title{font-family:var(--cond);font-size:12px;text-transform:uppercase;
  letter-spacing:.1em;color:var(--text3);margin-bottom:10px}

/* KPI grande */
.kpi-hero{text-align:center;padding:20px 16px}
.kpi-hero-val{font-family:var(--mono);font-size:64px;font-weight:500;
  color:var(--ok);line-height:1;margin-bottom:4px}
.kpi-hero-lbl{font-family:var(--cond);font-size:14px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text3)}

/* Grid de stats */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-item{background:var(--s2);border-radius:10px;padding:16px 18px;
  border:1px solid var(--border)}
.stat-val{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--text)}
.stat-lbl{font-family:var(--cond);font-size:12px;text-transform:uppercase;
  letter-spacing:.08em;color:var(--text3);margin-top:3px}
.stat-item.gold{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.2)}
.stat-item.gold .stat-val{color:var(--gold)}
.stat-item.green{background:rgba(77,184,122,.07);border-color:rgba(77,184,122,.2)}
.stat-item.green .stat-val{color:var(--ok)}

/* Lista de servicios */
.svc-item{display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border)}
.svc-item:last-child{border-bottom:none}
.svc-hora{font-family:var(--mono);font-size:14px;color:var(--text3);width:44px}
.svc-nombre{font-size:15px;font-weight:500;flex:1;padding:0 8px}
.svc-pago{font-family:var(--cond);font-size:10px;letter-spacing:.06em;
  text-transform:uppercase;padding:2px 8px;border-radius:20px;margin-right:8px}
.pago-ef{background:rgba(77,184,122,.15);color:var(--ok)}
.pago-db{background:rgba(85,130,224,.15);color:#5580d4}
.pago-tr{background:rgba(201,168,76,.15);color:var(--gold)}
.svc-monto{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--ok);
  text-align:right;min-width:70px}

/* Barra de progreso */
.prog-wrap{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;border-radius:4px;transition:width .6s ease}
.prog-gold{background:linear-gradient(90deg,var(--gold3),var(--gold))}
.prog-green{background:linear-gradient(90deg,var(--ok2),var(--ok))}

/* Ranking */
.rank-item{display:flex;align-items:center;gap:14px;
  padding:16px 18px;border-radius:10px;margin-bottom:10px;
  background:var(--s2);border:1px solid var(--border)}
.rank-item.me{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.3)}
.rank-pos{font-family:var(--display,var(--mono));font-size:22px;font-weight:700;
  width:32px;text-align:center;color:var(--text3)}
.rank-pos.gold{color:var(--gold)}
.rank-avatar{width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--cond);font-size:14px;font-weight:700}
.rank-info{flex:1}
.rank-name{font-family:var(--cond);font-size:18px;font-weight:600;letter-spacing:.04em}
.rank-sub{font-size:13px;color:var(--text2);margin-top:1px}
.rank-monto{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--ok)}

/* Estado vacío */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-ico{font-size:36px;margin-bottom:10px}
.empty-txt{font-family:var(--cond);font-size:13px;letter-spacing:.06em}

/* Liquidación */
.liq-total{
  background:linear-gradient(135deg,rgba(77,184,122,.12),rgba(77,184,122,.05));
  border:1px solid rgba(77,184,122,.3);border-radius:14px;
  padding:24px;text-align:center;margin-bottom:16px;
}
.liq-total-lbl{font-family:var(--cond);font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.liq-total-val{font-family:var(--mono);font-size:56px;font-weight:500;color:var(--ok)}
.liq-total-sub{font-family:var(--cond);font-size:12px;color:var(--text2);margin-top:6px}
.liq-row{display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid var(--border);font-size:16px}
.liq-row:last-child{border-bottom:none}
.liq-row-lbl{color:var(--text2)}
.liq-row-val{font-family:var(--mono);font-weight:500}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:200px;gap:12px}
.loading-dot{
  width:10px;height:10px;border-radius:50%;background:var(--gold);
  animation:loadPulse 1.2s ease infinite;
}
@keyframes loadPulse{0%,100%{transform:scale(.8);opacity:.4} 50%{transform:scale(1.2);opacity:1}}

/* Animaciones */
@keyframes logoIn{from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1} 50%{opacity:.3}}
@keyframes shake{0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}}

/* Formulario registro */
.form-group{margin-bottom:14px}
.form-label{font-family:var(--cond);font-size:13px;text-transform:uppercase;
  letter-spacing:.09em;color:var(--text3);display:block;margin-bottom:6px}
.form-select,.form-input{
  width:100%;padding:14px 16px;
  background:var(--s2);border:1px solid var(--border2);
  border-radius:10px;color:var(--text);
  font-family:var(--sans);font-size:14px;
  -webkit-appearance:none;appearance:none;
  transition:border-color .12s;
}
.form-select:focus,.form-input:focus{
  outline:none;border-color:var(--gold3);
}
.form-select option{background:var(--s2)}
.pago-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pago-btn{
  padding:11px 8px;border-radius:10px;border:1.5px solid var(--border2);
  background:var(--s2);color:var(--text2);font-family:var(--cond);
  font-size:13px;font-weight:600;letter-spacing:.04em;cursor:pointer;
  transition:all .12s;text-align:center;
}
.pago-btn.on{border-color:var(--gold);background:rgba(201,168,76,.12);color:var(--gold)}
.precio-display{
  background:var(--s3);border:1px solid var(--border2);border-radius:10px;
  padding:14px;text-align:center;margin-bottom:14px;
}
.precio-display-val{font-family:var(--mono);font-size:28px;color:var(--ok)}
.precio-display-lbl{font-family:var(--cond);font-size:10px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.btn-registrar{
  width:100%;padding:16px;background:var(--gold);color:var(--bg);
  border:none;border-radius:12px;font-family:var(--cond);
  font-size:16px;font-weight:700;letter-spacing:.06em;
  cursor:pointer;transition:opacity .12s;margin-top:4px;
}
.btn-registrar:active{opacity:.8}
.btn-registrar:disabled{opacity:.4;cursor:not-allowed}
.badge-pendiente{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(212,168,67,.15);border:1px solid rgba(212,168,67,.3);
  color:var(--gold);border-radius:20px;
  font-family:var(--cond);font-size:10px;letter-spacing:.06em;
  padding:3px 10px;text-transform:uppercase;
}
.mis-pendientes{margin-top:16px}

.pin-dot{
  width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(201,168,76,.4);
  transition:background .15s,border-color .15s;
}
.pin-dot.filled{background:var(--gold);border-color:var(--gold)}
.pin-key{
  width:72px;height:72px;border-radius:50%;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  color:#f0ebe0;font-family:'Barlow Condensed',sans-serif;
  font-size:26px;font-weight:500;cursor:pointer;
  transition:all .1s;-webkit-tap-highlight-color:transparent;
}
.pin-key:active{background:rgba(201,168,76,.25);border-color:var(--gold);transform:scale(.95)}

/* Scroll fino */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>

      <div class="loading" id="loadRank"><div class="loading-dot"></div></div>
      <div id="contentRank" style="display:none"></div>
    </div>

    <!-- REGISTRAR SERVICIO -->
    <div class="pane" id="pReg">
      <div id="contentReg"></div>
    </div>

    <!-- LIQUIDACIÓN -->
    <div class="pane" id="pLiq">
      <div class="loading" id="loadLiq"><div class="loading-dot"></div></div>
      <div id="contentLiq" style="display:none"></div>
    </div>

  </div>

  <!-- Nav inferior -->
  <nav class="app-nav">
    <button class="nav-btn on" id="navHoy" onclick="showPane('Hoy')">
      <span class="nav-icon">✂️</span>
      <span class="nav-label">Hoy</span>
    </button>
    <button class="nav-btn" id="navMes" onclick="showPane('Mes')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Mi mes</span>
    </button>
    <button class="nav-btn" id="navRanking" onclick="showPane('Ranking')">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">Ranking</span>
    </button>
    <button class="nav-btn" id="navReg" onclick="showPane('Reg')">
      <span class="nav-icon">➕</span>
      <span class="nav-label">Registrar</span>
    </button>
    <button class="nav-btn" id="navLiq" onclick="showPane('Liq')">
      <span class="nav-icon">💰</span>
      <span class="nav-label">Cobrar</span>
    </button>
  </nav>

</div>

<script>
const API = 'https://barberpilot-api-production.up.railway.app';

// PINs de acceso — cambiar aquí si se necesita actualizar
const PINS = {
  'b1': '1234',  // Didian
  'b2': '5678',  // Emerson
  'b3': '9012',  // Samuel
};

const SERVICIOS = [
  {id:'s01', nom:'Corte',                      precio:12000},
  {id:'s02', nom:'Barba',                       precio:10000},
  {id:'s03', nom:'Corte + Barba',               precio:20000},
  {id:'s04', nom:'Corte + Perfilado de barba',  precio:16000},
  {id:'s05', nom:'Perfilado de corte',          precio:6000},
  {id:'s06', nom:'Perfilado de cejas',          precio:4000},
  {id:'s07', nom:'Barba + Cejas',               precio:13000},
  {id:'s08', nom:'Perfilado de barba',          precio:6000},
  {id:'s09', nom:'Matizado canas cabello',      precio:8000},
  {id:'s10', nom:'Matizado canas barba',        precio:5000},
  {id:'s11', nom:'Corte Express + Perf. barba', precio:15000},
  {id:'custom', nom:'Servicio especial…',       precio:0},
];
var _regEstado = { sid:'s01', pago:'efectivo', precioCustom:0, propina:0 };
var BID = '', BNOM = '', _dataHoy = null, _dataMes = null;

// ══ HELPERS ════════════════════════════════════════════════════
function fmt(n){ return Math.round(n).toLocaleString('es-CL'); }
function fmtM(n){ return n>=1000000?'$'+(n/1000000).toFixed(2)+'M':'$'+Math.round(n/1000)+'K'; }
function pad(n){ return String(n).padStart(2,'0'); }
function hoy(){
  var d=new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function mesPeriodo(){
  var d=new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1);
}
function fechaLinda(f){
  if(!f) return '';
  var dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var d=new Date(f+'T12:00:00');
  return dias[d.getDay()]+' '+d.getDate()+' '+meses[d.getMonth()];
}
function pagoClass(p){
  return p==='efectivo'?'pago-ef':p==='debito'?'pago-db':'pago-tr';
}

// ══ PIN ════════════════════════════════════════════════════════
var _pinBid = '', _pinBnom = '', _pinBuffer = '';

function seleccionarBarbero(bid, bnom){
  _pinBid = bid; _pinBnom = bnom; _pinBuffer = '';
  document.getElementById('pinNombre').textContent = bnom;
  actualizarPinDisplay();
  document.getElementById('pinScreen').style.display = 'flex';
  document.getElementById('pinError').style.opacity = '0';
}

function pinPress(n){
  if(_pinBuffer.length >= 4) return;
  _pinBuffer += n;
  actualizarPinDisplay();
  if(_pinBuffer.length === 4) validarPin();
}

function pinBorrar(){
  _pinBuffer = _pinBuffer.slice(0,-1);
  actualizarPinDisplay();
}

function pinCancel(){
  _pinBuffer = '';
  document.getElementById('pinScreen').style.display = 'none';
}

function actualizarPinDisplay(){
  for(var i=0;i<4;i++){
    var dot = document.getElementById('dot'+i);
    if(dot) dot.classList.toggle('filled', i < _pinBuffer.length);
  }
}

function validarPin(){
  var correct = PINS[_pinBid];
  if(_pinBuffer === correct){
    document.getElementById('pinScreen').style.display = 'none';
    login(_pinBid, _pinBnom);
  } else {
    // PIN incorrecto — vibrar y resetear
    var err = document.getElementById('pinError');
    if(err){ err.style.opacity='1'; setTimeout(function(){err.style.opacity='0';},1500); }
    // Vibrar si soportado
    if(navigator.vibrate) navigator.vibrate([100,50,100]);
    // Sacudir los dots
    var disp = document.getElementById('pinDisplay');
    if(disp){ disp.style.animation='shake .3s ease'; setTimeout(function(){disp.style.animation='';},300); }
    _pinBuffer = '';
    setTimeout(actualizarPinDisplay, 300);
  }
}

// ══ LOGIN / LOGOUT ═════════════════════════════════════════════
function login(bid, bnom){
  BID=bid; BNOM=bnom;
  try{
    localStorage.setItem('bp_bid',bid);
    localStorage.setItem('bp_bnom',bnom);
    localStorage.setItem('bp_day',hoy());
  }catch(e){}

  document.getElementById('hdrNombre').textContent = bnom;
  var d=new Date();
  var dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('hdrFecha').textContent = dias[d.getDay()]+' '+d.getDate()+' '+meses[d.getMonth()];

  document.getElementById('splash').style.opacity='0';
  setTimeout(function(){
    document.getElementById('splash').style.display='none';
    document.getElementById('app').style.display='flex';
  },400);

  cargarHoy();
}

function logout(){
  BID=''; BNOM='';
  try{ localStorage.removeItem('bp_bid'); }catch(e){}
  document.getElementById('app').style.display='none';
  document.getElementById('splash').style.opacity='1';
  document.getElementById('splash').style.display='flex';
  _dataHoy=null; _dataMes=null;
}

// ══ NAVEGACIÓN ═════════════════════════════════════════════════
var panesNav = ['Hoy','Mes','Ranking','Reg','Liq'];
function showPane(nombre){
  panesNav.forEach(function(p){
    document.getElementById('p'+p).classList.toggle('on', p===nombre);
    document.getElementById('nav'+p).classList.toggle('on', p===nombre);
  });
  if(nombre==='Mes'    && !_dataMes)  cargarMes();
  if(nombre==='Ranking')              cargarRanking();
  if(nombre==='Liq'   && !_dataHoy)  cargarHoy();
  if(nombre==='Reg')                  renderFormReg();
}

// ══ FORMULARIO REGISTRO ═════════════════════════════════════
function renderFormReg(){
  var svc    = SERVICIOS.find(function(s){ return s.id===_regEstado.sid; }) || SERVICIOS[0];
  var precio = svc.id==='custom' ? _regEstado.precioCustom : svc.precio;
  var com    = _regEstado.pago==='debito' ? 0.43 : 0.5;
  var bb     = Math.round(precio * com) + (_regEstado.propina||0);

  var h = '';
  h += '<div class="card"><div class="card-title">Registrar servicio</div>';

  // Selector de servicio
  h += '<div class="form-group"><label class="form-label">Servicio</label>';
  h += '<select class="form-select" id="regSvc" onchange="onSvcChange()">';
  SERVICIOS.forEach(function(s){
    h += '<option value="'+s.id+'"'+(s.id===_regEstado.sid?' selected':'')+'>'+s.nom+(s.precio>0?' — $'+s.precio.toLocaleString('es-CL'):' (precio libre)')+'</option>';
  });
  h += '</select></div>';

  // Precio libre si es custom
  if(svc.id==='custom'){
    h += '<div class="form-group" id="precioLibreGroup"><label class="form-label">Precio del servicio</label>';
    h += '<input type="number" class="form-input" id="regPrecioLibre" placeholder="0" value="'+(_regEstado.precioCustom||'')+'" oninput="onPrecioLibreChange()" inputmode="numeric">';
    h += '</div>';
  } else {
    h += '<div class="form-group" id="precioLibreGroup" style="display:none"></div>';
  }

  // Propina
  h += '<div class="form-group"><label class="form-label">Propina (opcional)</label>';
  h += '<input type="number" class="form-input" id="regPropina" placeholder="0" value="'+(_regEstado.propina||'')+'" oninput="onPropinaChange()" inputmode="numeric">';
  h += '</div>';

  // Forma de pago
  h += '<div class="form-group"><label class="form-label">Forma de pago</label>';
  h += '<div class="pago-grid">';
  ['efectivo','debito','transferencia'].forEach(function(p){
    var lbl = p==='efectivo'?'💵 Efectivo':p==='debito'?'💳 Débito':'📲 Transf.';
    var pagoOnClass = p===_regEstado.pago?' on':'';
    h += '<button class="pago-btn'+pagoOnClass+'" onclick="onPagoChange(\'' + p + '\')">'+lbl+'</button>';
  });
  h += '</div></div>';

  // Preview precio
  h += '<div class="precio-display">';
  h += '<div class="precio-display-val">$'+bb.toLocaleString('es-CL')+'</div>';
  h += '<div class="precio-display-lbl">Recibes tú · '+Math.round(com*100)+'% comisión</div>';
  h += '</div>';

  // Botón enviar
  h += '<button class="btn-registrar" id="btnEnviarReg" onclick="enviarRegistro()">';
  h += '✓ Enviar para aprobación';
  h += '</button>';
  h += '</div>'; // card

  // Mis pendientes
  h += '<div class="mis-pendientes">';
  h += '<div style="font-family:var(--cond);font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin-bottom:8px">Mis registros pendientes de hoy</div>';
  h += '<div id="listaPendientesPropios"><div class="loading" style="height:60px"><div class="loading-dot"></div></div></div>';
  h += '</div>';

  document.getElementById('contentReg').innerHTML = h;
  cargarPendientesPropios();
}

function onSvcChange(){
  var sel = document.getElementById('regSvc');
  if(!sel) return;
  _regEstado.sid = sel.value;
  if(_regEstado.sid !== 'custom') _regEstado.precioCustom = 0;
  renderFormReg();
}
function onPagoChange(p){
  _regEstado.pago = p;
  renderFormReg();
}
function onPrecioLibreChange(){
  var inp = document.getElementById('regPrecioLibre');
  _regEstado.precioCustom = parseInt(inp.value)||0;
  // Actualizar preview sin re-renderizar todo
  var svc = SERVICIOS.find(function(s){return s.id==='custom';});
  var com = _regEstado.pago==='debito'?0.43:0.5;
  var bb  = Math.round(_regEstado.precioCustom * com)+(_regEstado.propina||0);
  var pv  = document.querySelector('.precio-display-val');
  if(pv) pv.textContent = '$'+bb.toLocaleString('es-CL');
}
function onPropinaChange(){
  var inp = document.getElementById('regPropina');
  _regEstado.propina = parseInt(inp.value)||0;
  var svc = SERVICIOS.find(function(s){return s.id===_regEstado.sid;})||SERVICIOS[0];
  var precio = svc.id==='custom'?_regEstado.precioCustom:svc.precio;
  var com = _regEstado.pago==='debito'?0.43:0.5;
  var bb  = Math.round(precio*com)+_regEstado.propina;
  var pv  = document.querySelector('.precio-display-val');
  if(pv) pv.textContent = '$'+bb.toLocaleString('es-CL');
}

function enviarRegistro(){
  var btn = document.getElementById('btnEnviarReg');
  if(btn){ btn.disabled=true; btn.textContent='Enviando…'; }

  var svc    = SERVICIOS.find(function(s){return s.id===_regEstado.sid;})||SERVICIOS[0];
  var precio = svc.id==='custom' ? _regEstado.precioCustom : svc.precio;
  if(precio <= 0){ alert('Ingresa el precio del servicio'); if(btn){btn.disabled=false;btn.textContent='✓ Enviar para aprobación';} return; }

  var com  = _regEstado.pago==='debito' ? 0.43 : 0.5;
  var bb   = Math.round(precio * com);
  var neg  = precio - bb;
  var ts   = Date.now();
  var now  = new Date();
  var hora = pad(now.getHours())+':'+pad(now.getMinutes());

  var reg = {
    id:     'TK'+ts,
    bid:    BID,
    bnom:   BNOM,
    sid:    svc.id,
    snom:   svc.id==='custom' ? (document.getElementById('regSvcNombre')?.value || 'Servicio especial') : svc.nom,
    precio: precio,
    pago:   _regEstado.pago,
    com:    com,
    bb:     bb,
    neg:    neg,
    propina:_regEstado.propina||0,
    fecha:  hoy(),
    hora:   hora,
    ts:     ts,
  };

  fetch(API+'/registros/barbero', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(reg)
  })
  .then(function(r){return r.json();})
  .then(function(json){
    if(json.ok){
      // Reset estado
      _regEstado = {sid:'s01', pago:'efectivo', precioCustom:0, propina:0};
      renderFormReg();
      // Toast
      mostrarToastReg('✓ Registrado — esperando aprobación');
    } else {
      alert('Error: '+json.error);
      if(btn){btn.disabled=false;btn.textContent='✓ Enviar para aprobación';}
    }
  })
  .catch(function(){
    alert('Sin conexión. Intenta de nuevo.');
    if(btn){btn.disabled=false;btn.textContent='✓ Enviar para aprobación';}
  });
}

function cargarPendientesPropios(){
  fetch(API+'/pendientes')
    .then(function(r){return r.json();})
    .then(function(json){
      var lista = (json.pendientes||[]).filter(function(r){return r.bid===BID;});
      var el = document.getElementById('listaPendientesPropios');
      if(!el) return;
      if(lista.length===0){
        el.innerHTML='<div style="font-size:12px;color:var(--text3);padding:8px 0">Sin registros pendientes</div>';
        return;
      }
      var h='';
      lista.forEach(function(r){
        h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">';
        h += '<div>';
        h += '<div style="font-size:13px">'+r.snom+'</div>';
        h += '<div style="font-size:11px;color:var(--text3);margin-top:2px">'+r.hora+' · '+r.pago+'</div>';
        h += '</div>';
        h += '<div style="text-align:right">';
        h += '<div class="badge-pendiente">⏳ Pendiente</div>';
        h += '<div style="font-family:var(--mono);font-size:13px;color:var(--ok);margin-top:4px">$'+fmt(r.bb+(r.propina||0))+'</div>';
        h += '</div></div>';
      });
      el.innerHTML=h;
    })
    .catch(function(){});
}

function mostrarToastReg(msg){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ok);color:#fff;padding:10px 20px;border-radius:20px;font-family:var(--cond);font-size:13px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(function(){t.remove();},400);},2500);
}

// ══ CARGA HOY ══════════════════════════════════════════════════════
function cargarHoy(){
  document.getElementById('loadHoy').style.display='flex';
  document.getElementById('contentHoy').style.display='none';
  document.getElementById('loadLiq').style.display='flex';
  document.getElementById('contentLiq').style.display='none';

  fetch(API+'/barbero/'+BID+'/hoy')
    .then(function(r){return r.json();})
    .then(function(json){
      if(!json.ok) return;
      _dataHoy=json;
      renderHoy(json);
      renderLiq(json);
      document.getElementById('liveDot').style.display='block';
      // Badge de pendientes en el tab Hoy
      if(json.pendientes_propios > 0){
        var navHoy = document.getElementById('navHoy');
        if(navHoy && !navHoy.querySelector('.badge-cnt')){
          var badge=document.createElement('span');
          badge.className='badge-cnt';
          badge.style.cssText='position:absolute;top:-2px;right:-2px;background:var(--gold);color:var(--bg);border-radius:50%;width:14px;height:14px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center';
          badge.textContent=json.pendientes_propios;
          navHoy.style.position='relative';
          navHoy.appendChild(badge);
        }
      }
    })
    .catch(function(){
      document.getElementById('loadHoy').innerHTML='<div class="empty"><div class="empty-ico">📡</div><div class="empty-txt">Sin conexión</div></div>';
    });
}

function renderHoy(d){
  var regs = d.registros || [];
  var fact = d.facturado || 0;
  var bb   = d.a_cobrar  || 0;
  var n    = d.servicios || 0;
  var tk   = n>0 ? Math.round(fact/n) : 0;

  var h = '';
  // Hero
  h += '<div class="kpi-hero">';
  h += '<div class="kpi-hero-val">'+n+'</div>';
  h += '<div class="kpi-hero-lbl">Servicios realizados hoy</div>';
  h += '</div>';
  // Stats
  h += '<div class="stat-row">';
  h += '<div class="stat-item green"><div class="stat-val">$'+fmt(bb)+'</div><div class="stat-lbl">A cobrar</div></div>';
  h += '<div class="stat-item gold"><div class="stat-val">$'+fmt(fact)+'</div><div class="stat-lbl">Facturado</div></div>';
  h += '</div>';
  h += '<div class="stat-row">';
  h += '<div class="stat-item"><div class="stat-val">$'+fmt(tk)+'</div><div class="stat-lbl">Ticket prom.</div></div>';
  var propinas = regs.reduce(function(a,r){return a+(r.bb||0);},0);
  var propTotal = regs.reduce(function(a,r){return a+(r.propina||0);},0);
  h += '<div class="stat-item"><div class="stat-val">$'+fmt(propTotal)+'</div><div class="stat-lbl">Propinas</div></div>';
  h += '</div>';
  // Lista
  if(regs.length > 0){
    h += '<div class="card"><div class="card-title">Servicios del día</div>';
    var sorted = regs.slice().sort(function(a,b){return (b.ts||0)-(a.ts||0);});
    sorted.forEach(function(r){
      h += '<div class="svc-item">';
      h += '<span class="svc-hora">'+(r.hora||'--')+'</span>';
      h += '<span class="svc-nombre">'+r.snom+'</span>';
      h += '<span class="svc-pago '+pagoClass(r.pago)+'">'+r.pago.slice(0,3).toUpperCase()+'</span>';
      h += '<span class="svc-monto">$'+fmt(r.bb+(r.propina||0))+'</span>';
      h += '</div>';
    });
    h += '</div>';
  } else {
    h += '<div class="empty"><div class="empty-ico">✂️</div><div class="empty-txt">Aún no hay servicios registrados hoy</div></div>';
  }

  document.getElementById('contentHoy').innerHTML = h;
  document.getElementById('loadHoy').style.display='none';
  document.getElementById('contentHoy').style.display='block';
}

// ══ CARGA MES ══════════════════════════════════════════════════
function cargarMes(){
  document.getElementById('loadMes').style.display='flex';
  document.getElementById('contentMes').style.display='none';

  fetch(API+'/barbero/'+BID+'/mes/'+mesPeriodo())
    .then(function(r){return r.json();})
    .then(function(json){
      if(!json.ok) return;
      _dataMes=json;
      renderMes(json);
    })
    .catch(function(){});
}

function renderMes(d){
  var n    = d.servicios  || 0;
  var fact = d.facturado  || 0;
  var bb   = d.a_cobrar   || 0;
  var tk   = d.ticket_prom|| 0;
  var ups  = d.upselling  || 0;
  var META_BB = 1200000;
  var pct  = Math.min(100, Math.round(bb/META_BB*100));
  var colorProg = pct>=100?'prog-green':'prog-gold';

  var h = '';
  h += '<div class="card">';
  h += '<div class="card-title">Mi producción · '+mesPeriodo()+'</div>';
  h += '<div class="stat-row">';
  h += '<div class="stat-item"><div class="stat-val">'+n+'</div><div class="stat-lbl">Servicios</div></div>';
  h += '<div class="stat-item gold"><div class="stat-val">$'+fmt(tk)+'</div><div class="stat-lbl">Ticket prom.</div></div>';
  h += '</div>';
  h += '<div class="stat-row">';
  h += '<div class="stat-item green"><div class="stat-val">'+fmtM(bb)+'</div><div class="stat-lbl">Ingresos mes</div></div>';
  h += '<div class="stat-item"><div class="stat-val">'+ups+'</div><div class="stat-lbl">Upselling</div></div>';
  h += '</div>';
  h += '</div>';

  // Meta de ingresos
  h += '<div class="card">';
  h += '<div class="card-title">Progreso hacia la meta</div>';
  h += '<div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;margin-bottom:6px">';
  h += '<span style="color:var(--ok)">'+fmtM(bb)+'</span>';
  h += '<span style="color:var(--text3)">Meta: $1.200.000</span>';
  h += '</div>';
  h += '<div class="prog-wrap"><div class="prog-fill '+colorProg+'" style="width:'+pct+'%"></div></div>';
  h += '<div style="font-family:var(--cond);font-size:11px;color:var(--text3);margin-top:4px">';
  h += pct+'% completado';
  if(bb < META_BB){
    var falta = META_BB - bb;
    h += ' · Faltan $'+fmt(falta);
  } else {
    h += ' · 🎉 ¡Meta superada!';
  }
  h += '</div></div>';

  // Servicios realizados por tipo
  if(d.registros && d.registros.length > 0){
    var svcMap = {};
    d.registros.forEach(function(r){
      svcMap[r.snom] = (svcMap[r.snom]||0)+1;
    });
    var svcs = Object.entries(svcMap).sort(function(a,b){return b[1]-a[1];});
    h += '<div class="card"><div class="card-title">Servicios realizados este mes</div>';
    svcs.forEach(function(s){
      var pctSvc = Math.round(s[1]/n*100);
      h += '<div style="margin-bottom:8px">';
      h += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">';
      h += '<span>'+s[0]+'</span><span style="font-family:var(--mono);color:var(--text2)">'+s[1]+' ('+pctSvc+'%)</span>';
      h += '</div>';
      h += '<div class="prog-wrap" style="height:4px"><div class="prog-fill prog-gold" style="width:'+pctSvc+'%"></div></div>';
      h += '</div>';
    });
    h += '</div>';
  }

  document.getElementById('contentMes').innerHTML = h;
  document.getElementById('loadMes').style.display='none';
  document.getElementById('contentMes').style.display='block';
}

// ══ RANKING ════════════════════════════════════════════════════
function cargarRanking(){
  document.getElementById('loadRank').style.display='flex';
  document.getElementById('contentRank').style.display='none';

  fetch(API+'/stats/mes/'+mesPeriodo())
    .then(function(r){return r.json();})
    .then(function(json){
      if(!json.ok) return;
      renderRanking(json.datos||[]);
    })
    .catch(function(){});
}

function renderRanking(datos){
  // Consolidar por barbero
  var map = {};
  datos.forEach(function(r){
    var b = r.bnom;
    if(!map[b]) map[b]={bnom:b,fact:0,bb:0,svc:0};
    map[b].fact += (r.facturado||0);
    map[b].bb   += (r.total_barbero||0);
    map[b].svc  += (r.servicios||0);
  });
  var rank = Object.values(map).sort(function(a,b){return b.bb-a.bb;});
  var avatarColor = {
    'Didian': {bg:'rgba(201,168,76,.15)',color:'var(--gold)',letra:'D'},
    'Emerson':{bg:'rgba(77,184,122,.12)',color:'var(--ok)',letra:'E'},
    'Samuel': {bg:'rgba(85,130,224,.15)',color:'#5580d4',letra:'S'},
  };
  var medals = ['🥇','🥈','🥉'];

  var h = '<div style="padding:4px 0 12px;font-family:var(--cond);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)">Mayo 2026 · Ingresos acumulados</div>';

  rank.forEach(function(b,i){
    var av = avatarColor[b.bnom]||{bg:'var(--s2)',color:'var(--text)',letra:b.bnom[0]};
    var isMe = b.bnom === BNOM;
    var tk = b.svc>0 ? Math.round(b.fact/b.svc) : 0;
    h += '<div class="rank-item'+(isMe?' me':'')+'">';
    h += '<div class="rank-pos'+(i===0?' gold':'')+'">'+medals[i]+'</div>';
    h += '<div class="rank-avatar" style="background:'+av.bg+';color:'+av.color+'">'+av.letra+'</div>';
    h += '<div class="rank-info">';
    var tuTag2 = isMe ? '<span style="font-size:10px;color:#c9a84c"> · tú</span>' : '';
    h += '<div class="rank-name">'+b.bnom+tuTag2+'</div>';
    h += '<div class="rank-sub">'+b.svc+' svc · ticket $'+fmt(tk)+'</div>';
    h += '</div>';
    h += '<div class="rank-monto">'+fmtM(b.bb)+'</div>';
    h += '</div>';
  });

  // Distancia al primero si no soy el primero
  var miPos = rank.findIndex(function(b){return b.bnom===BNOM;});
  if(miPos > 0){
    var diff = rank[0].bb - (rank[miPos]||{bb:0}).bb;
    h += '<div class="card" style="text-align:center;margin-top:4px">';
    h += '<div style="font-family:var(--cond);font-size:11px;color:var(--text3);margin-bottom:4px">Para llegar al primer lugar</div>';
    h += '<div style="font-family:var(--mono);font-size:24px;color:var(--gold)">$'+fmt(diff)+'</div>';
    h += '</div>';
  } else if(miPos === 0){
    h += '<div class="card" style="text-align:center;margin-top:4px;background:rgba(201,168,76,.07);border-color:rgba(201,168,76,.2)">';
    h += '<div style="font-size:28px;margin-bottom:4px">🏆</div>';
    h += '<div style="font-family:var(--cond);font-size:13px;color:var(--gold)">¡Vas primero este mes!</div>';
    h += '</div>';
  }

  document.getElementById('contentRank').innerHTML = h;
  document.getElementById('loadRank').style.display='none';
  document.getElementById('contentRank').style.display='block';
}

// ══ LIQUIDACIÓN ════════════════════════════════════════════════
function renderLiq(d){
  var regs = d.registros || [];
  var bb   = d.a_cobrar  || 0;
  var fact = d.facturado || 0;
  var n    = d.servicios || 0;

  var ef=0,db=0,tr=0;
  regs.forEach(function(r){
    var monto = r.bb+(r.propina||0);
    if(r.pago==='efectivo')       ef+=monto;
    else if(r.pago==='debito')    db+=monto;
    else if(r.pago==='transferencia') tr+=monto;
  });

  var h = '';
  h += '<div class="liq-total">';
  h += '<div class="liq-total-lbl">Total a cobrar hoy</div>';
  h += '<div class="liq-total-val">$'+fmt(bb)+'</div>';
  h += '<div class="liq-total-sub">'+n+' servicios · $'+fmt(fact)+' facturado</div>';
  h += '</div>';

  h += '<div class="card"><div class="card-title">Desglose por forma de pago</div>';
  if(ef>0){ h += '<div class="liq-row"><span class="liq-row-lbl">💵 Efectivo</span><span class="liq-row-val" style="color:var(--ok)">$'+fmt(ef)+'</span></div>'; }
  if(db>0){ h += '<div class="liq-row"><span class="liq-row-lbl">💳 Débito</span><span class="liq-row-val" style="color:#5580d4">$'+fmt(db)+'</span></div>'; }
  if(tr>0){ h += '<div class="liq-row"><span class="liq-row-lbl">📲 Transferencia</span><span class="liq-row-val" style="color:var(--gold)">$'+fmt(tr)+'</span></div>'; }
  h += '<div class="liq-row" style="margin-top:6px;padding-top:12px;border-top:1px solid var(--border2)">';
  h += '<span class="liq-row-lbl" style="font-weight:600">Total</span>';
  h += '<span class="liq-row-val" style="color:var(--ok);font-size:16px">$'+fmt(bb)+'</span>';
  h += '</div></div>';

  if(n===0){
    h = '<div class="empty"><div class="empty-ico">💰</div><div class="empty-txt">Sin servicios registrados hoy</div></div>';
  }

  document.getElementById('contentLiq').innerHTML = h;
  document.getElementById('loadLiq').style.display='none';
  document.getElementById('contentLiq').style.display='block';
}
